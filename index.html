<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>ADT Trainer</title>
  <meta name="description" content="Übungs-App zur Vorbereitung auf die ADT-Prüfung Tumordokumentar/in">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#4a72e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1320" media="(prefers-color-scheme: dark)">
  <!-- iOS „Zum Home-Bildschirm“ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ADT Trainer">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
</head>
<body>
  <header class="appbar">
    <button class="back-btn hidden" id="backBtn" aria-label="Zurück">‹</button>
    <h1>ADT&nbsp;Trainer</h1>
    <span class="spacer"></span>
    <span class="streak-pill" id="streakVal">🔥 0</span>
  </header>

  <main id="app"><!-- wird per JS gefüllt --></main>
  <div id="actionbar" class="actionbar hidden"></div>

  <!-- Reihenfolge wichtig: erst Daten, dann App -->
  <script src="./data/questions.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
